name: Vercel Production Deploy

# Auto-deploy production when main is updated. Does NOT use `vercel git connect`.
# Requires GitHub repo secret: VERCEL_TOKEN (Vercel account token with deploy scope).

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_8KsMblEpAhenEqmbtMXtS3kl
  VERCEL_PROJECT_ID: prj_nXS2jmJYdlMDbqOdMgQrWN8PBzj8

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    steps:
      - name: Require VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub secret VERCEL_TOKEN. Add it under Settings → Secrets → Actions."
            echo "Create a token at https://vercel.com/account/tokens then set VERCEL_TOKEN in the repo."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          url=$(npx vercel@54.18.1 deploy --prod --yes --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $url"

      - name: Summary
        run: |
          echo "### Vercel production deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Deployment:** ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Production alias:** https://trust-receipt.vercel.app" >> "$GITHUB_STEP_SUMMARY"
